<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
    <title>Frontend Mentor | Social links profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <section class="introduction">
            <img src="./assets/images/avatar-jessica.jpeg" alt="Jessica Randall's avatar" class="avatar">
            <h1 class="name">Jessica Randall</h1>
            <p class="address">London, United Kingdom</p>
            <p class="biography">"Front-end developer and avid reader."</p>
        </section>
        <section class="links-section">
            <ul class="social-links">
                <li>
                    <a class="btn-link" href="#">GitHub</a>
                </li>
                <li>
                    <a class="btn-link" href="#">Frontend Mentor</a>
                </li>
                <li>
                    <a class="btn-link" href="#">LinkedIn</a>
                </li>
                <li>
                    <a class="btn-link" href="#">Twitter</a>
                </li>
                <li>
                    <a class="btn-link" href="#">Instagram</a>
                </li>
            </ul>
        </section>
    </main>
    <footer class="attribution">
        Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
        Coded by <a href="#">Shayan</a>.
    </footer>
</body>
</html>
