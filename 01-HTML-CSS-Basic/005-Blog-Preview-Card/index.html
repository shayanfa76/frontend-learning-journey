<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog card</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
</head>
<body>
    <main class="container">
        <article class="blog-card">
            <img src="./assets/images/illustration-article.svg" alt="Blog post image" class="card-image">
            <div class="content">
                <span class="category">Learning</span>
                <p class="publish-date">Published 21 Dec 2023</p>
                <h1 class="title"><a href="#">HTML & CSS foundations</a></h1>
                <p class="description">These languages are the backbone of every website, defining structure, content, and presentation.</p>
            </div>
            <div class="author-section">
                <img src="./assets/images/image-avatar.webp" alt="avatar" class="avatar">
                <span class="author-name">Greg Hooper</span>
            </div>
        </article>
    </main>
    <footer class="attribution">
        <p>
            Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
            Coded by <a href="#" target="_blank">Shayan</a>.
        </p>
      </footer>
</body>
</html>
